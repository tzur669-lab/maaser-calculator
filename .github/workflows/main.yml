name: Build Android APK

on:
  push:
    branches: [ "main", "develop" ]
  workflow_dispatch:
    inputs:
      note:
        description: 'הערה (אופציונלי)'
        required: false
        default: 'בנייה ידנית'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Decode Google Services JSON
      run: |
        mkdir -p app
        echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

    - name: Download Rubik Fonts
      run: |
        mkdir -p app/src/main/res/font
        curl -fL "https://github.com/googlefonts/rubik/raw/main/old/version-1/4_fonts/ttf/Rubik-Regular.ttf" \
          -o app/src/main/res/font/rubik_regular.ttf
        curl -fL "https://github.com/googlefonts/rubik/raw/main/old/version-1/4_fonts/ttf/Rubik-Medium.ttf" \
          -o app/src/main/res/font/rubik_medium.ttf
        curl -fL "https://github.com/googlefonts/rubik/raw/main/old/version-1/4_fonts/ttf/Rubik-Bold.ttf" \
          -o app/src/main/res/font/rubik_bold.ttf
        # תיקון סיומות כפולות אם קיימות
        for f in app/src/main/res/font/*.ttf.ttf; do
          [ -f "$f" ] && mv "$f" "${f%.ttf.ttf}.ttf"
        done
        echo "=== Downloaded fonts ==="
        ls -la app/src/main/res/font/

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Clean Gradle Cache
      run: |
        rm -rf ~/.gradle/caches
        rm -rf ~/.gradle/wrapper/dists

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: maaser-app-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
